name: Update CV from Overleaf

# Pulls the latest CV source from your Overleaf project (UVA institutional Git),
# compiles it with TeX Live, and commits the resulting CV.pdf to assets/pdf/
# only if its bytes actually changed.
#
# One-time setup:
#   1. In Overleaf: Menu → Sync → Git → copy the clone URL
#      (looks like https://git.overleaf.com/<project-id>)
#   2. In Overleaf: Account Settings → Tokens → create a Git Authentication Token
#   3. On GitHub repo: Settings → Secrets and variables → Actions → New secret
#         OVERLEAF_REPO_URL  = the clone URL
#         OVERLEAF_GIT_TOKEN = the Git auth token
#   4. Adjust TEX_ROOT_FILE below if your CV's root .tex isn't main.tex.
#   5. From the Actions tab, run this workflow manually once to verify.

on:
  schedule:
    - cron: "0 6 * * *"   # daily, 06:00 UTC (≈ 02:00 EDT)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-cv:
    runs-on: ubuntu-latest
    env:
      OUT_PDF_PATH: assets/pdf/CV.pdf    # served by al-folio via _pages/cv.md cv_pdf: CV.pdf
    steps:
      - name: Checkout site
        uses: actions/checkout@v5

      - name: Clone Overleaf CV project
        env:
          REPO_URL: ${{ secrets.OVERLEAF_REPO_URL }}
          TOKEN: ${{ secrets.OVERLEAF_GIT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${REPO_URL:-}" ] || [ -z "${TOKEN:-}" ]; then
            echo "::error::OVERLEAF_REPO_URL or OVERLEAF_GIT_TOKEN is not set"; exit 1
          fi
          # Inject the token into the URL (Overleaf uses HTTP basic auth: user 'git', pass = token).
          # Accepts both `https://git.overleaf.com/<id>` and `https://git@git.overleaf.com/<id>`.
          authed=$(printf '%s' "$REPO_URL" | sed -E "s|^https://([^/@]+@)?|https://git:${TOKEN}@|")
          git clone --depth=1 "$authed" overleaf-cv
          ls overleaf-cv

      - name: Detect root .tex file
        id: detect
        run: |
          set -euo pipefail
          cd overleaf-cv
          # Prefer common names if they exist and contain \documentclass.
          ROOT=""
          for f in main.tex cv.tex CV.tex resume.tex Resume.tex; do
            if [ -f "$f" ] && grep -q '\\documentclass' "$f"; then
              ROOT="$f"; break
            fi
          done
          # Fallback: any .tex (recursive) that contains \documentclass.
          if [ -z "$ROOT" ]; then
            ROOT=$(grep -rl '\\documentclass' --include='*.tex' . 2>/dev/null | head -n1 | sed 's|^\./||')
          fi
          if [ -z "$ROOT" ]; then
            echo "::error::no .tex file containing \\documentclass found in Overleaf project"
            echo "Files in overleaf-cv:"; ls -la
            exit 1
          fi
          echo "Detected root tex file: $ROOT"
          echo "root_file=$ROOT"     >> "$GITHUB_OUTPUT"
          echo "root_stem=${ROOT%.tex}" >> "$GITHUB_OUTPUT"

      - name: Compile LaTeX with frozen TeX Live 2024 (matches Overleaf's default)
        # The official TeX Live "historic" image freezes each yearly TL release.
        # TL 2026 (the default in xu-cheng/latex-action) is stricter than what
        # Overleaf compiles against; TL2024-historic matches Overleaf much more
        # closely so documents that build there build here too.
        env:
          ROOT_FILE: ${{ steps.detect.outputs.root_file }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/overleaf-cv:/work" \
            -w /work \
            texlive/texlive:TL2024-historic \
            latexmk -xelatex -file-line-error -interaction=nonstopmode -halt-on-error "$ROOT_FILE"

      - name: Copy compiled PDF into the site
        env:
          ROOT_STEM: ${{ steps.detect.outputs.root_stem }}
        run: |
          set -euo pipefail
          src="overleaf-cv/${ROOT_STEM}.pdf"
          if [ ! -f "$src" ]; then
            echo "::error::expected ${src} after compile, not found"
            ls overleaf-cv
            exit 1
          fi
          mkdir -p "$(dirname "$OUT_PDF_PATH")"
          cp "$src" "$OUT_PDF_PATH"

      - name: Commit and push if the PDF changed
        id: commit
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUT_PDF_PATH"
          if git diff --staged --quiet; then
            echo "CV unchanged — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(cv): refresh CV.pdf from Overleaf"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Deploy site
        # A commit pushed by GITHUB_TOKEN doesn't trigger downstream workflows,
        # so Deploy site won't run on its own after the CV refresh. Kick it
        # explicitly via workflow_dispatch (which GITHUB_TOKEN *is* allowed to
        # invoke) so the new CV actually reaches gh-pages.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"master"}'
          echo "Dispatched Deploy site on master."
