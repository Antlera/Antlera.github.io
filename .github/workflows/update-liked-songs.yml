name: Update liked songs

# Refreshes _data/playlist_tracks.json (the playground "songs" list) from the
# public NetEase playlist. No login/cookie needed. Best-effort: if the fetch
# fails, the previous data is kept and nothing is committed.

on:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write # required to workflow_dispatch deploy.yml after the refresh commit

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch first 10 tracks
        # Best-effort: NetEase may rate-limit overseas CI IPs. On failure we keep
        # the committed data and the job still passes (no noisy red runs).
        run: python3 scripts/fetch_liked_songs.py 436513472 10 || echo "fetch failed; keeping existing data"

      - name: Commit if changed
        id: commit
        run: |
          if [ -n "$(git status --porcelain _data/playlist_tracks.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/playlist_tracks.json
            git commit -m "chore: refresh liked songs"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Deploy site
        # A commit pushed with GITHUB_TOKEN doesn't fire `on: push` workflows,
        # so kick deploy.yml explicitly via workflow_dispatch (which is exempt
        # from that rule). Otherwise the fresh data never reaches the live site.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"master"}'
          echo "Dispatched Deploy site on master."
